groups:
  - name: semantic_cache_slos
    rules:
      - alert: HighCacheHitLatency
        expr: histogram_quantile(0.99, sum by (le, tier) (rate(cache_latency_seconds_bucket{tier="l1"}[5m]))) > 0.02
        for: 2m
        labels:
          severity: warning
          slo: "1"
        annotations:
          summary: "Slow L1 Cache Hits"
          description: "P99 cache hit latency (l1) is {{ $value }}s, exceeding 20ms."

      - alert: HighBackendLatency
        expr: histogram_quantile(0.99, sum by (le) (rate(cache_latency_seconds_bucket{tier="backend"}[5m]))) > 0.700
        for: 2m
        labels:
          severity: warning
          slo: "2"
        annotations:
          summary: "Slow Backend Path"
          description: "P99 backend response time is {{ $value }}s, exceeding 700ms."

      - alert: LowCacheHitRate
        expr: sum(rate(cache_hits_total[5m])) / (sum(rate(cache_hits_total[5m])) + sum(rate(cache_misses_total[5m]))) < 0.70
        for: 5m
        labels:
          severity: warning
          slo: "3"
        annotations:
          summary: "Low Cache Hit Rate"
          description: "Cache hit rate is {{ $value | printf \"%.2f\" }}, current target is > 70%."

      - alert: HighErrorRate
        expr: increase(backend_calls_total{status="error"}[5m]) / increase(backend_calls_total[5m]) > 0.001
        for: 1m
        labels:
          severity: critical
          slo: "4"
        annotations:
          summary: "High API Error Rate"
          description: "Internal error rate detected at {{ $value | printf \"%.2f\" }}%."

      - alert: HighFalsePositiveRate
        expr: sum(rate(policy_rejection_total{reason="similarity"}[1h])) / sum(rate(cache_hits_total[1h])) > 0.02
        for: 10m
        labels:
          severity: warning
          slo: "5"
        annotations:
          summary: "High False Positive Rate"
          description: "Detected many semantic matches being rejected by policy ({{ $value }})."

      - alert: SLOBurnRateHigh
        expr: (sum(rate(cache_misses_total[1h])) / (sum(rate(cache_hits_total[1h])) + sum(rate(cache_misses_total[1h])))) > 0.35
        for: 30m
        labels:
          severity: critical
          slo: "6"
        annotations:
          summary: "Extreme SLO Burn Rate"
          description: "System is consuming error budget (cache misses) faster than 35% target."
